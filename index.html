<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Calculator</title>
		<script src="script.js" defer></script>
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<div class="Calculator">
			<div class = "white-background">
				<p class = "calct0" id = "calct0">0</p>
				<div class="display">
					<p class = "calct1" id = "calct1">0</p>
				</div>
			</div>
			<div class = "container0">
				<button id = "Clear">Clear</button>
				<button id = "Delete">Delete</button>
			</div>
			<div class="top">
				<div class="container1">
					<button id="b7" class="calcb">7</button>
					<button id="b8" class="calcb">8</button>
					<button id="b9" class="calcb">9</button>
					<button id="b4" class="calcb">4</button>
					<button id="b5" class="calcb">5</button>
					<button id="b6" class="calcb">6</button>
					<button id="b1" class="calcb">1</button>
					<button id="b2" class="calcb">2</button>
					<button id="b3" class="calcb">3</button>
				</div>
				<div class="container2">
					<button id="divide" class="calcb">÷</button>
					<button id="multiply" class="calcb">×</button>
					<button id="subtract" class="calcb">-</button>
				</div>
			</div>
			<div class="bottom">
				<div class="container3">
					<button id="b0" class="calcb">0</button>
					<button id="point" class="calcb">.</button>
					<button id="equal" class="calcb">=</button>
					<button id="plus" class="calcb">+</button>
				</div>
			</div>
		</div>
	</body>
</html>
